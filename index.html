<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DonJuan VPN</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={darkMode:'class',theme:{extend:{colors:{darkBg:'#0f172a',darkCard:'#1e293b'}}}}</script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
<style>body{background:#0f172a;color:#f8fafc;font-family:'Inter',sans-serif}[x-cloak]{display:none!important}
.notif{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:999;padding:.75rem 1.25rem;border-radius:.5rem;font-size:.875rem;max-width:24rem;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body class="antialiased min-h-screen p-4 md:p-8" x-data="app()">

<!-- Notification -->
<div x-show="notif" x-cloak class="notif" :class="notifType==='error'?'bg-red-600':'bg-blue-600'" x-text="notif" x-transition></div>

<div class="max-w-4xl mx-auto space-y-6">
<div class="flex items-center justify-between mb-2">
  <a href="https://donjuanvpn.com" target="_blank" class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent hover:from-blue-300 hover:to-indigo-400 transition-colors">DonJuan VPN</a>
  <div class="flex items-center space-x-4">
    <button @click="forceCleanup()" class="text-xs bg-slate-600 hover:bg-slate-500 text-white px-2 py-1 rounded shadow" x-text="t('restart')"></button>
    <div class="flex items-center space-x-2">
      <div class="w-3 h-3 rounded-full" :class="running?'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.8)]':'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.8)]'"></div>
      <span class="text-sm font-medium" x-text="running?t('running'):t('stopped')"></span>
    </div>
  </div>
</div>

<div class="flex flex-col items-center space-y-4 mb-6">
  <button @click="running?stopProxy():startProxy()" class="px-8 py-3 text-white font-bold text-lg rounded-full shadow-lg transition-all transform hover:scale-[1.05] active:scale-95" :class="running?'bg-gradient-to-r from-yellow-600 to-orange-600':'bg-gradient-to-r from-blue-600 to-indigo-600'" x-text="running?t('stopProxy'):t('startProxy')"></button>
</div>

<div class="flex space-x-1 bg-darkCard p-1 rounded-lg">
  <button @click="tab='servers'" :class="tab==='servers'?'bg-blue-600 text-white':'text-slate-400'" class="flex-1 py-2 text-sm font-medium rounded-md transition-colors" x-text="t('servers')"></button>
  <button @click="tab='settings'" :class="tab==='settings'?'bg-blue-600 text-white':'text-slate-400'" class="flex-1 py-2 text-sm font-medium rounded-md transition-colors" x-text="t('settings')"></button>
  <button @click="tab='routing'" :class="tab==='routing'?'bg-blue-600 text-white':'text-slate-400'" class="flex-1 py-2 text-sm font-medium rounded-md transition-colors" x-text="t('routing')"></button>
</div>

<!-- Servers -->
<div x-show="tab==='servers'" x-cloak class="space-y-4">
  <div class="flex items-center space-x-2">
    <button @click="autoSelect()" :disabled="autoTesting" class="px-3 py-1.5 text-xs bg-slate-700 hover:bg-slate-600 rounded-md text-white font-medium border border-slate-600" :class="autoTesting?'opacity-50 cursor-wait':''"><span x-show="autoTesting" class="inline-block animate-spin mr-1">⟳</span><span x-text="autoTesting?t('testing'):t('autoConnect')"></span></button>
    <button @click="testLatency()" :disabled="testing" class="px-3 py-1.5 text-xs bg-slate-700 hover:bg-slate-600 rounded-md text-white font-medium border border-slate-600" :class="testing?'opacity-50 cursor-wait':''"><span x-show="testing" class="inline-block animate-spin mr-1">⟳</span><span x-text="testing?t('testing'):t('test')"></span></button>
    <div class="flex-1"></div>
    <button @click="showLogs=true" class="px-3 py-1.5 text-xs bg-slate-700 hover:bg-slate-600 rounded-md text-white font-medium border border-slate-600" x-text="t('showLogs')"></button>
  </div>

  <!-- Subscriptions -->
  <template x-for="sub in data.subscriptions" :key="sub.id">
    <div class="bg-darkCard rounded-xl shadow-lg border border-slate-700/50 overflow-hidden">
      <div class="flex items-center justify-between px-6 py-4 bg-slate-800/80 hover:bg-slate-700 cursor-pointer" @click="openSubscription=openSubscription===sub.id?null:sub.id">
        <div class="flex items-center space-x-2">
          <svg class="w-4 h-4 transform transition-transform text-slate-400" :class="openSubscription===sub.id?'rotate-180':''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          <span class="font-medium text-slate-200" x-text="sub.name"></span>
          <span x-show="sub.details" class="text-xs text-slate-500" x-text="sub.details"></span>
        </div>
        <div class="flex items-center space-x-2" @click.stop>
          <button @click="updateSubscription(sub)" class="text-xs bg-slate-700 hover:bg-slate-600 rounded px-2 py-1 text-slate-300" :disabled="subUpdating===sub.id" :class="subUpdating===sub.id?'opacity-50 cursor-wait':''">
            <span x-show="subUpdating===sub.id" class="inline-block animate-spin mr-1">⟳</span>
            <span x-text="t('updateSub')"></span>
          </button>
          <button @click="editSub=JSON.parse(JSON.stringify(sub));showEditSubModal=true" class="text-slate-400 hover:text-blue-400" :title="t('edit')">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
          </button>
          <button @click="deleteSubscription(sub.id)" class="text-slate-400 hover:text-red-500" :title="t('delete')">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
          </button>
        </div>
      </div>
      <div x-show="openSubscription===sub.id" x-collapse>
        <div class="overflow-x-auto">
          <table class="w-full text-sm text-left">
            <thead class="text-xs uppercase bg-slate-800 text-slate-400">
              <tr><th class="px-4 py-3" x-text="t('name')"></th><th class="px-4 py-3" x-text="t('protocol')"></th><th class="px-4 py-3" x-text="t('domain')"></th><th class="px-4 py-3 text-right" x-text="t('latency')"></th><th class="px-4 py-3 w-10"></th></tr>
            </thead>
            <tbody>
              <template x-for="node in sub.nodes" :key="node.id">
                <tr class="bg-slate-800/30 border-b border-slate-700/50 hover:bg-slate-800/80 cursor-pointer" @click="selectedNode=node.id; saveData().then(()=>{if(!running)startProxy()})">
                  <td class="px-4 py-3 font-medium flex items-center">
                    <div class="w-2 h-2 rounded-full mr-2" :class="selectedNode===node.id?'bg-green-500':'bg-slate-600'"></div>
                    <span x-text="node.remarks"></span>
                  </td>
                  <td class="px-4 py-3 text-slate-300 uppercase text-xs" x-text="node.type"></td>
                  <td class="px-4 py-3 text-slate-400" x-text="node.domain||'-'"></td>
                  <td class="px-4 py-3 text-right font-mono" x-text="node.latency?node.latency+'ms':'-'"></td>
                  <td class="px-4 py-3 text-right">
                    <button @click.stop="editNode=JSON.parse(JSON.stringify(node));editNodeSubId=sub.id;showEditModal=true" class="text-slate-400 hover:text-blue-400" :title="t('edit')">
                      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    </button>
                  </td>
                </tr>
              </template>
              <tr x-show="!sub.nodes||sub.nodes.length===0"><td colspan="5" class="px-4 py-8 text-center text-slate-500" x-text="t('noSubServers')"></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </template>

  <div class="bg-darkCard rounded-xl p-6 shadow-lg border border-slate-700/50">
    <div class="overflow-x-auto rounded-lg border border-slate-700/50">
      <table class="w-full text-sm text-left">
        <thead class="text-xs uppercase bg-slate-800 text-slate-400">
          <tr><th class="px-4 py-3" x-text="t('name')"></th><th class="px-4 py-3" x-text="t('protocol')"></th><th class="px-4 py-3" x-text="t('domain')"></th><th class="px-4 py-3 text-right" x-text="t('latency')"></th><th class="px-4 py-3 w-10"></th></tr>
        </thead>
        <tbody>
          <template x-for="node in data.nodes" :key="node.id">
            <tr class="bg-slate-800/30 border-b border-slate-700/50 hover:bg-slate-800/80 cursor-pointer" @click="selectedNode=node.id; saveData().then(()=>{if(!running)startProxy()})">
              <td class="px-4 py-3 font-medium flex items-center">
                <div class="w-2 h-2 rounded-full mr-2" :class="selectedNode===node.id?'bg-green-500':'bg-slate-600'"></div>
                <span x-text="node.remarks"></span>
              </td>
              <td class="px-4 py-3 text-slate-300 uppercase text-xs" x-text="node.type"></td>
              <td class="px-4 py-3 text-slate-400" x-text="node.domain||'-'"></td>
              <td class="px-4 py-3 text-right font-mono" x-text="node.latency?node.latency+'ms':'-'"></td>
              <td class="px-4 py-3 text-right">
                <button @click.stop="editNode=JSON.parse(JSON.stringify(node));editNodeSubId=null;showEditModal=true" class="text-slate-400 hover:text-blue-400" :title="t('edit')">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                </button>
              </td>
            </tr>
          </template>
          <tr x-show="!data.nodes||data.nodes.length===0"><td colspan="5" class="px-4 py-8 text-center text-slate-500" x-text="t('noServers')"></td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="flex justify-center space-x-2">
    <button @click="showAddModal=true" class="text-sm bg-blue-600/20 text-blue-400 hover:bg-blue-600/30 px-4 py-2 rounded-lg font-medium" x-text="'+ '+t('addConfig')"></button>
    <button @click="showSubModal=true;newSubName='';newSubUrl=''" class="text-sm bg-indigo-600/20 text-indigo-400 hover:bg-indigo-600/30 px-4 py-2 rounded-lg font-medium" x-text="'+ '+t('addSubscription')"></button>
  </div>
</div>

<!-- Settings -->
<div x-show="tab==='settings'" x-cloak class="space-y-6">
  <div class="bg-darkCard rounded-xl p-6 shadow-lg border border-slate-700/50">
    <h2 class="text-xl font-semibold mb-6" x-text="t('coreSettings')"></h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <template x-for="(value,key) in data.settings" :key="key">
        <template x-if="key!=='language'">
        <label class="flex items-center justify-between p-4 bg-slate-800/50 rounded-lg border border-slate-700/50 hover:bg-slate-800 cursor-pointer">
          <div class="flex items-center space-x-2" :title="getSettingHelp(key)">
            <span class="font-medium capitalize text-slate-200" x-text="getSettingLabel(key)"></span>
            <svg class="w-4 h-4 text-slate-500 hover:text-slate-300 cursor-help" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </div>
          <div class="relative inline-block w-12 mr-2 align-middle select-none">
            <input type="checkbox" x-model="data.settings[key]" @change="saveData()" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-transform duration-200" :class="data.settings[key]?'translate-x-6 border-blue-500':'translate-x-0 border-slate-400'"/>
            <label class="toggle-label block overflow-hidden h-6 rounded-full cursor-pointer" :class="data.settings[key]?'bg-blue-500':'bg-slate-400'"></label>
          </div>
        </label>
        </template>
      </template>
    </div>
  </div>
  <div class="bg-darkCard rounded-xl p-6 shadow-lg border border-slate-700/50">
    <h2 class="text-xl font-semibold mb-4" x-text="t('panel')"></h2>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <p class="text-sm text-slate-400">
          <span x-show="sysinfo.installed"><span x-text="t('currentVersion')"></span> <span class="text-white font-mono" x-text="sysinfo.version"></span></span>
          <span x-show="!sysinfo.installed"><a href="https://github.com/procrastinando/donjuan" target="_blank" class="text-blue-400 hover:text-blue-300 underline"><span x-text="t('currentVersion')"></span></a> <span class="text-red-400 font-mono" x-text="t('notInstalled')"></span></span>
        </p>
        <p class="text-sm text-slate-400" x-show="sysinfo.latestVersion"><span x-text="t('latestVersion')"></span> <span x-show="sysinfo.latestVersion!==sysinfo.version" class="font-mono"><a href="https://github.com/procrastinando/donjuan" target="_blank" class="text-blue-400 hover:text-blue-300 underline" x-text="sysinfo.latestVersion"></a></span><span x-show="sysinfo.latestVersion===sysinfo.version" class="text-white font-mono" x-text="sysinfo.latestVersion"></span></p>
        <p class="text-sm text-slate-500 mt-1"><span x-text="t('os')"></span> <span class="text-white" x-text="sysinfo.os"></span></p>
        <button x-show="!sysinfo.installed" @click="installSingbox()" :disabled="installing" class="mt-3 px-3 py-1.5 text-sm rounded text-white" :class="installing?'bg-gray-500 cursor-wait':'bg-green-600 hover:bg-green-500'">
          <span x-show="installing" class="inline-block animate-spin mr-1">⟳</span>
          <span x-text="installing?t('working'):t('installGuide')"></span>
        </button>
      </div>
      <div class="space-y-3">
        <div class="flex items-center space-x-2">
          <input type="number" x-model.number="data.port" :placeholder="t('port')" class="w-32 bg-slate-800 text-white text-sm rounded border border-slate-600 px-2 py-1.5">
          <button @click="saveData(); showNotif(t('portSaved'))" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-sm rounded" x-text="t('updatePort')"></button>
        </div>
        <div>
          <select x-model="data.settings.language" @change="saveData()" class="bg-slate-800 border border-slate-600 rounded text-sm text-white px-2 py-1.5 focus:outline-none focus:border-blue-500">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="zh">中文</option>
            <option value="ru">Русский</option>
          </select>
        </div>
      </div>
    </div>
  </div>
  <div class="flex justify-center"><button @click="showConfigModal=true;loadConfig()" class="text-sm bg-slate-700/50 text-slate-300 hover:bg-slate-600/50 hover:text-white px-4 py-2 rounded-lg font-medium" x-text="t('seeConfig')"></button></div>
</div>

<!-- Routing -->
<div x-show="tab==='routing'" x-cloak class="space-y-6">
  <div class="bg-darkCard rounded-xl p-6 shadow-lg border border-slate-700/50">
    <h2 class="text-xl font-semibold mb-4" x-text="t('geositeCategories')"></h2>
    <div class="space-y-2">
      <template x-for="cat in geositeCategories" :key="cat.name">
        <div class="border border-slate-700/80 rounded-lg overflow-hidden bg-slate-800/20">
          <button @click="openCategory=openCategory===cat.name?null:cat.name" class="w-full text-left px-4 py-3 bg-slate-800/80 hover:bg-slate-700 text-sm font-medium text-slate-200 flex justify-between items-center transition-colors">
            <span x-text="t('cat_'+cat.name) || cat.name"></span>
            <svg class="w-4 h-4 transform transition-transform" :class="openCategory===cat.name?'rotate-180':''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
          </button>
          <div x-show="openCategory===cat.name" x-collapse class="p-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
            <template x-for="item in cat.items" :key="item">
              <div class="flex justify-between items-center p-2.5 bg-slate-800/60 rounded border border-slate-700/50 hover:bg-slate-700/50 transition-colors">
                <div class="flex items-center space-x-2" :title="getGeositeHelp(item)">
                  <span class="text-xs font-mono text-slate-300" x-text="item"></span>
                  <svg class="w-3 h-3 text-slate-500 hover:text-slate-300 cursor-help" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
                <select x-model="data.routing.geositeRules[item]" @change="toggleGeositeRule(item, data.routing.geositeRules[item])" class="bg-slate-900 border border-slate-600 rounded text-xs text-white px-2 py-1 focus:outline-none focus:border-blue-500">
                  <option value="proxy" x-text="t('proxy')"></option>
                  <option value="direct" x-text="t('direct')"></option>
                  <option value="block" x-text="t('block')"></option>
                </select>
              </div>
            </template>
          </div>
        </div>
      </template>
    </div>
  </div>
  <div class="bg-darkCard rounded-xl p-6 shadow-lg border border-slate-700/50">
    <h2 class="text-xl font-semibold mb-4" x-text="t('customRules')"></h2>
    <div class="flex flex-col md:flex-row space-y-2 md:space-y-0 md:space-x-2 mb-4">
      <select x-model="newRule.type" class="w-full md:w-28 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white"><option>Domain</option><option>IP</option><option>Keyword</option></select>
      <input type="text" x-model="newRule.value" :placeholder="t('valuePlaceholder')" class="flex-1 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white">
      <select x-model="newRule.action" class="w-full md:w-28 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white"><option value="Proxy" x-text="t('proxy')"></option><option value="Direct" x-text="t('direct')"></option><option value="Block" x-text="t('block')"></option></select>
      <input type="text" x-model="newRule.source" :placeholder="t('sourcePlaceholder')" class="w-full md:w-36 bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 text-sm text-white">
      <button @click="addRule()" class="px-4 py-2 bg-blue-600 hover:bg-blue-500 text-white rounded-lg text-sm font-medium" x-text="t('add')"></button>
    </div>
    <div class="overflow-x-auto rounded-lg border border-slate-700/50">
      <table class="w-full text-sm text-left">
        <thead class="text-xs uppercase bg-slate-800 text-slate-400">
          <tr><th class="px-4 py-3" x-text="t('type')"></th><th class="px-4 py-3" x-text="t('value')"></th><th class="px-4 py-3" x-text="t('action')"></th><th class="px-4 py-3" x-text="t('source')"></th><th class="px-4 py-3 w-10"></th></tr>
        </thead>
        <tbody>
          <template x-for="(rule,i) in data.routing.customRules" :key="i">
            <tr class="bg-slate-800/30 border-b border-slate-700/50 hover:bg-slate-800/80">
              <td class="px-4 py-3" x-text="rule.type"></td>
              <td class="px-4 py-3 font-mono text-xs text-blue-400" x-text="rule.value"></td>
              <td class="px-4 py-3"><span class="px-2 py-1 rounded text-xs font-medium" :class="{'bg-blue-900/50 text-blue-300':rule.action==='Proxy','bg-green-900/50 text-green-300':rule.action==='Direct','bg-red-900/50 text-red-300':rule.action==='Block'}" x-text="t(rule.action.toLowerCase())"></span></td>
              <td class="px-4 py-3 text-xs text-slate-500" x-text="rule.source||'-'"></td>
              <td class="px-4 py-3 text-right">
                <button @click="deleteRule(i)" class="text-slate-400 hover:text-red-500">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                </button>
              </td>
            </tr>
          </template>
          <tr x-show="!data.routing.customRules||data.routing.customRules.length===0"><td colspan="5" class="px-4 py-8 text-center text-slate-500" x-text="t('noCustomRules')"></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</div>

<!-- Logs Modal -->
<div x-show="showLogs" x-cloak class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
  <div class="bg-darkCard rounded-xl border border-slate-700 w-full max-w-4xl h-[80vh] flex flex-col shadow-2xl overflow-hidden">
    <div class="p-4 border-b border-slate-700 flex justify-between items-center bg-slate-800/50">

      <div class="flex space-x-3 items-center">
        <label class="flex items-center space-x-1.5 cursor-pointer text-xs text-slate-300">
          <input type="checkbox" x-model="data.settings.saveLogs" @change="saveData()" class="rounded bg-slate-700 border-slate-600 text-blue-500 focus:ring-blue-500">
          <span x-text="t('saveLogs')"></span>
        </label>
        <button @click="clearLogFiles()" class="px-3 py-1 text-xs bg-red-700 hover:bg-red-600 rounded text-white" x-text="t('clearLogs')"></button>
        <button @click="fetchLogs()" class="px-3 py-1 text-xs bg-slate-700 hover:bg-slate-600 rounded text-white" x-text="t('refresh')"></button>
        <button @click="showLogs=false" class="text-slate-400 hover:text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg></button>
      </div>
    </div>
    <div id="logContainer" class="flex-1 overflow-auto p-0 bg-[#0B0F19]">
      <table class="w-full text-xs text-left">
        <thead class="text-xs uppercase bg-slate-800 text-slate-400 sticky top-0">
          <tr>
            <th class="px-3 py-2" x-text="t('time')"></th>
            <th class="px-3 py-2" x-text="t('source')"></th>
            <th class="px-3 py-2">
              <div class="flex items-center space-x-1">
                <span x-text="t('dir')"></span>
                <select x-model="logFilters.dir" class="bg-slate-700 text-white rounded outline-none cursor-pointer"><option value="" x-text="t('all')"></option><template x-for="v in [...new Set(parsedLogs.map(l=>l.dir).filter(Boolean))]" :key="v"><option :value="v" x-text="v"></option></template></select>
              </div>
            </th>
            <th class="px-3 py-2">
              <div class="flex items-center space-x-1">
                <span x-text="t('rule')"></span>
                <select x-model="logFilters.protocol" class="bg-slate-700 text-white rounded outline-none cursor-pointer"><option value="" x-text="t('all')"></option><template x-for="v in [...new Set(parsedLogs.map(l=>l.protocol).filter(Boolean))]" :key="v"><option :value="v" x-text="v"></option></template></select>
              </div>
            </th>
            <th class="px-3 py-2">Domain/IP</th>
          </tr>
        </thead>
        <tbody class="font-mono text-slate-300">
          <template x-for="(entry,i) in filteredLogs" :key="i">
            <tr class="border-b border-slate-800/50 hover:bg-slate-800/30">
              <td class="px-3 py-1.5 text-slate-500 whitespace-nowrap" x-text="entry.time"></td>
              <td class="px-3 py-1.5 text-slate-500" x-text="entry.source"></td>
              <td class="px-3 py-1.5" x-text="entry.dir"></td>
              <td class="px-3 py-1.5 text-blue-400" x-text="entry.protocol"></td>
              <td class="px-3 py-1.5 text-blue-300 break-all" x-text="entry.domain"></td>
            </tr>
          </template>
        </tbody>
      </table>
      <div x-show="parsedLogs.length===0" class="text-center text-slate-500 mt-8 p-4" x-text="t('noLogs')"></div>
    </div>
  </div>

document.addEventListener('alpine:init',()=>{
Alpine.data('app',()=>({
  tab:'servers',running:false,showLogs:false,showAddModal:false,showEditModal:false,showResetConfirm:false,showConfigModal:false,showSubModal:false,showEditSubModal:false,installing:false,busy:false,autoTesting:false,testing:false,subLoading:false,subUpdating:null,openSubscription:null,
  logs:[],newNodeUrl:'',newNodeRemarks:'',newSubName:'',newSubUrl:'',editNode:null,editSub:null,editNodeSubId:null,selectedNode:'auto',configJson:'',
  logFilters:{dir:'',protocol:'',domain:''},
  notif:'',notifType:'info',notifTimer:null,
  sysinfo:{version:'',latestVersion:'',installed:false,os:''},
  data:{
    settings:{ipv6:false,fakeIP:true,dnsLeaks:false,routeOnly:false,allowInsecure:false,tun:true,autoRedirect:false,sniffing:true,localNetwork:true,saveLogs:false,language:'en'},
    port:8080,
    routing:{customRules:[],geositeRules:{}},
    nodes:[],selectedNode:'auto'
  },
  geositeCategories: [
    { name: 'Geographic & TLD', items: ['geolocation-cn', 'geolocation-!cn', 'tld-cn', 'tld-!cn', 'tld-ru', 'tld-opennic'] },
    { name: 'Ad-Blocking', items: ['category-ads', 'category-ads-all', 'category-ads-ir'] },
    { name: 'Regional Content', items: ['category-ir', 'category-ru'] },
    { name: 'Financial', items: ['category-finance', 'category-bank-cn', 'category-bank-ru', 'category-cryptocurrency'] },
    { name: 'Media & Entertainment', items: ['category-media', 'category-media-cn', 'category-entertainment', 'category-porn', 'category-acg'] },
    { name: 'Gaming', items: ['category-games', 'category-games-cn', 'category-enhance-gaming'] },
    { name: 'Tech & Dev', items: ['category-dev', 'category-dev-cn', 'category-doh', 'category-proxy-tunnels'] },
    { name: 'Communication & Social', items: ['category-communication', 'category-social-media-cn', 'category-forums'] },
    { name: 'E-Commerce', items: ['category-ecommerce', 'category-ecommerce-ru'] },
    { name: 'Infrastructure', items: ['category-vpnservices', 'category-anticensorship', 'category-speedtest'] }
  ],
  openCategory: null,
  newRule:{type:'Domain',value:'',action:'Proxy',source:''},
  connInterval:null,

  t(key){const lang=this.data.settings.language||'en';return(i18n[lang]&&i18n[lang][key])||(i18n.en[key])||key;},

  getSettingLabel(key){
    const m={tun:'TUN',autoRedirect:'Auto Redirect',fakeIP:'Fake IP',dnsLeaks:'DNS Leaks',routeOnly:'Route Only',allowInsecure:'Allow Insecure',localNetwork:'Local Network',saveLogs:'Save Logs',ipv6:'IPv6',sniffing:'Sniffing'};
    return m[key]||this.t(key)||key.replace(/([A-Z])/g,' $1').trim();
  },

  showNotif(msg,type){
    this.notif=msg;this.notifType=type||'info';
    clearTimeout(this.notifTimer);
    this.notifTimer=setTimeout(()=>{this.notif=''},4000);
  },

  async init(){
    this.loadConfig();
    await this.loadData();
    await this.loadSysinfo();
    await this.checkLatestVersion();
    await this.checkStatus();
    this.$watch('showLogs',v=>{
      if(v){this.fetchLogs();this.connInterval=setInterval(()=>this.fetchLogs(),2000)}
      else{clearInterval(this.connInterval)}
    });
    setInterval(()=>this.checkStatus(),3000);
    setInterval(()=>this.checkLatestVersion(),86400000);
  },

  async checkStatus(){if(this.busy)return;try{const r=await fetch('/api/status');if(r.ok){this.running=(await r.json()).running;if(this.running&&!this.sysinfo.latestVersion)this.checkLatestVersion();}}catch(e){}},

  async loadSysinfo(){try{const r=await fetch('/api/sysinfo');if(r.ok){const d=await r.json();this.sysinfo.version=d.version;this.sysinfo.installed=d.installed;this.sysinfo.os=d.os;}}catch(e){}},

  async checkLatestVersion(){
    try{
      const r=await fetch('https://api.github.com/repos/SagerNet/sing-box/releases/latest');
      if(r.ok){const d=await r.json();const tag=d.tag_name||'';this.sysinfo.latestVersion=tag.replace(/^v/,'');}
    }catch(e){}
  },

  async loadConfig(){
    try{
      const r=await fetch('/api/config');
      if(r.ok){this.configJson=await r.text();}
      else{this.configJson=window.__CONFIG_JSON__||'';}
    }catch(e){this.configJson=window.__CONFIG_JSON__||'';}
  },

  async installSingbox(){
    this.installing=true;this.showNotif(this.t('installing'));
    try{
      const r=await fetch('/api/install-singbox');
      if(r.ok){this.showNotif(this.t('installed'));await this.loadSysinfo()}
      else{this.showNotif(this.t('installFailed')+(await r.text()),'error')}
    }catch(e){this.showNotif(this.t('installError')+e,'error')}
    this.installing=false;
  },

  async loadData(){
    const res=await fetch('/api/data');
    if(res.ok){
      const p=await res.json();
      if(p&&p.settings){
        this.data=p;
        if(!this.data.nodes)this.data.nodes=[];
        if(!this.data.subscriptions)this.data.subscriptions=[];
        if(!this.data.routing.customRules)this.data.routing.customRules=[];
        if(!this.data.routing.geositeRules)this.data.routing.geositeRules={};
        if(!this.data.port)this.data.port=8080;
        if(!this.data.settings.language)this.data.settings.language='en';

        this.geositeCategories.forEach(cat => cat.items.forEach(item => {
          if(!this.data.routing.geositeRules[item]) this.data.routing.geositeRules[item]='proxy';
        }));

        if(this.data.selectedNode)this.selectedNode=this.data.selectedNode;
      }
      else{await this.saveData()}
    }
  },

  async saveData(){
    this.busy=true;
    this.data.selectedNode=this.selectedNode;
    const wasRunning=this.running;
    try {
      await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.data)});
    } catch(e) {}
    if(wasRunning){
      this.showNotif(this.t('applyingChanges'), 'info');
      await fetch('/api/start?node='+this.selectedNode);
      this.running=true;
    }
    this.loadConfig();
    setTimeout(()=>{this.busy=false},3000);
  },

  async startProxy(){
    const allNodes=[...this.data.nodes,...this.data.subscriptions.flatMap(s=>s.nodes)];
    if(!allNodes||allNodes.length===0){this.showNotif(this.t('noServer'),'error');return}
    this.busy=true;
    this.running=true;
    const res=await fetch('/api/start?node='+this.selectedNode);
    if(res.ok){this.running=true;this.showNotif(this.t('proxyStarted'));this.loadConfig()}
    else{this.running=false;this.showNotif(this.t('failedStart'),'error')}
    setTimeout(()=>{this.busy=false},3000);
  },

  async stopProxy(){
    this.busy=true;
    this.showNotif(this.t('cleaningUp'));
    const res=await fetch('/api/stop');
    if(res.ok){this.running=false;this.showNotif(this.t('proxyStopped'))}
    setTimeout(()=>{this.busy=false},1000);
  },

  async autoSelect(){
    this.autoTesting=true;this.showNotif(this.t('testingAll'));
    const allNodes=[...this.data.nodes,...this.data.subscriptions.flatMap(s=>s.nodes)];
    let best=null,bestMs=Infinity;
    for(const n of allNodes){
      try{const r=await fetch('/api/test-latency?id='+encodeURIComponent(n.id)+'&url='+encodeURIComponent(n.url));if(r.ok){const d=await r.json();n.latency=d.ms>0?d.ms:-1;if(d.ms>0&&d.ms<bestMs){bestMs=d.ms;best=n}}}
      catch(e){n.latency=-1}
    }
    this.autoTesting=false;
    try{await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.data)})}catch(e){}
    if(best){this.selectedNode=best.id;this.busy=true;this.running=true;await this.startProxy();setTimeout(()=>{this.busy=false},5000);this.showNotif(this.t('connectedTo')+best.remarks+' ('+bestMs+'ms)')}
    else{this.showNotif(this.t('noServer'),'error');await fetch('/api/cleanup');this.running=false}
  },

  forceCleanup(){
    this.showNotif(this.t('cleaningUp'));
    fetch('/api/restart-ui').then(()=>{
      this.running=false;
    }).catch(()=>{
      this.running=false;
    });
  },

  async toggleGeositeRule(item, action){
    if(action !== 'proxy'){
      this.busy=true;
      this.showNotif(this.t('downloadingGeosite')+item+'...');
      try{
        const r=await fetch('/api/download-geodata?name=geosite-'+item);
        if(r.ok){
          const results=await r.json();
          let ok=true;
          for(const res of results){
            if(res.error){this.showNotif('Error: '+res.file+': '+res.error,'error');ok=false}
            else{this.showNotif(res.file+' downloaded ('+(res.size/1024).toFixed(0)+' KB)')}
          }
          if(!ok){this.data.routing.geositeRules[item]='proxy';return}
        }else{this.showNotif(this.t('downloadFailed'),'error');this.data.routing.geositeRules[item]='proxy';return}
      }catch(e){this.showNotif(this.t('installError')+e,'error');this.data.routing.geositeRules[item]='proxy';return}
    }
    this.saveData();
  },

  async addNode(){
    if(!this.newNodeUrl)return;
    const proto=this.detectProtocol(this.newNodeUrl);
    if(!proto){this.showNotif(this.t('unsupportedProtocol'),'error');return;}
    const transportErr=this.validateTransport(this.newNodeUrl,proto);
    if(transportErr){this.showNotif(transportErr,'error');return;}
    let domain='',remarks=(this.newNodeRemarks||'').trim();
    try{const u=new URL(this.newNodeUrl);domain=u.hostname;if(!remarks&&u.hash){let p=u.hash.split('#').filter(Boolean);if(p.length>0)remarks=decodeURIComponent(p[p.length-1])}}catch(e){}
    if(!remarks)remarks=this.t('node')+(this.data.nodes.length+1);
    this.data.nodes.push({id:Math.random().toString(36).substring(7),remarks,type:proto,url:this.newNodeUrl,domain,latency:0});
    this.newNodeUrl='';this.newNodeRemarks='';this.showAddModal=false;
    await this.saveData();this.showNotif(this.t('serverAdded')+remarks);
  },

  detectProtocol(url){
    if(url.startsWith('vless://'))return'vless';
    if(url.startsWith('hy2://')||url.startsWith('hysteria2://'))return'hy2';
    if(url.startsWith('trojan://'))return'trojan';
    return null;
  },

  validateTransport(url,proto){
    if(proto==='hy2')return null;
    try{
      const u=new URL(url);
      const t=(u.searchParams.get('type')||'').toLowerCase();
      if(!t||t==='tcp')return null;
      if(t==='grpc'||t==='httpupgrade')return null;
      return this.t('unsupportedTransport')+': '+t+this.t('unsupportedTransportMsg');
    }catch(e){return null;}
  },

  async saveEditNode(){
    if(!this.editNode)return;
    const node=this.data.nodes.find(n=>n.id===this.editNode.id);
    if(!node)return;
    const proto=this.detectProtocol(this.editNode.url);
    if(!proto){this.showNotif(this.t('unsupportedProtocol'),'error');return;}
    const transportErr=this.validateTransport(this.editNode.url,proto);
    if(transportErr){this.showNotif(transportErr,'error');return;}
    node.remarks=this.editNode.remarks;
    node.url=this.editNode.url;
    node.type=proto;
    let domain='';
    try{const u=new URL(this.editNode.url);domain=u.hostname;}catch(e){}
    node.domain=domain;
    this.showEditModal=false;this.editNode=null;
    await this.saveData();this.showNotif(this.t('configUpdated'));
  },

  async deleteNode(id){
    if(this.editNodeSubId){
      const sub=this.data.subscriptions.find(s=>s.id===this.editNodeSubId);
      if(sub){sub.nodes=sub.nodes.filter(n=>n.id!==id);if(sub.nodes.length===0)this.selectedNode='auto';}
    }else{
      this.data.nodes=this.data.nodes.filter(n=>n.id!==id);
    }
    if(this.selectedNode===id)this.selectedNode='auto';
    this.showEditModal=false;this.editNode=null;this.editNodeSubId=null;
    await this.saveData()
  },

  async addSubscription(){
    if(!this.newSubUrl)return;
    let name=this.newSubName.trim();
    let fetchUrl=this.newSubUrl.trim();
    if(!name){
      try{const u=new URL(fetchUrl);if(u.hash&&u.hash.length>1){name=decodeURIComponent(u.hash.substring(1))}}catch(e){}
    }
    if(!name)name='Subscription';
    this.subLoading=true;
    try{
      const r=await fetch('/api/fetch-subscription',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:fetchUrl})});
      if(!r.ok){this.showNotif(this.t('installFailed')+await r.text(),'error');this.subLoading=false;return}
      const d=await r.json();
      const sub={id:Math.random().toString(36).substring(7),name:name,url:fetchUrl,details:d.details||'',nodes:d.nodes||[]};
      if(!this.data.subscriptions)this.data.subscriptions=[];
      this.data.subscriptions.push(sub);
      this.showSubModal=false;this.newSubUrl='';this.newSubName='';
      await this.saveData();
      const total=sub.nodes.length;
      const unsup=d.unsupported||0;
      this.showNotif(total+' '+this.t('subAdded')+(unsup>0?', '+unsup+this.t('subUnsupported'):''));
    }catch(e){this.showNotif(this.t('installError')+e,'error')}
    this.subLoading=false;
  },

  async updateSubscription(sub){
    this.subUpdating=sub.id;
    try{
      const r=await fetch('/api/fetch-subscription',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url:sub.url})});
      if(!r.ok){this.showNotif(this.t('installFailed')+await r.text(),'error');this.subUpdating=null;return}
      const d=await r.json();
      sub.nodes=d.nodes||[];
      sub.details=d.details||'';
      await this.saveData();
      const total=sub.nodes.length;
      const unsup=d.unsupported||0;
      this.showNotif(total+' '+this.t('subUpdated')+(unsup>0?', '+unsup+this.t('subUnsupported'):''));
    }catch(e){this.showNotif(this.t('installError')+e,'error')}
    this.subUpdating=null;
  },

  async deleteSubscription(id){
    this.data.subscriptions=this.data.subscriptions.filter(s=>s.id!==id);
    if(!this.data.nodes||this.data.nodes.length===0){const hasSubNodes=this.data.subscriptions.some(s=>s.nodes&&s.nodes.length>0);if(!hasSubNodes)this.selectedNode='auto';}
    await this.saveData();
  },

  async saveEditSub(){
    if(!this.editSub)return;
    const sub=this.data.subscriptions.find(s=>s.id===this.editSub.id);
    if(sub){sub.name=this.editSub.name;sub.url=this.editSub.url;}
    this.showEditSubModal=false;this.editSub=null;
    await this.saveData();
  },

  async addRule(){
    if(!this.newRule.value)return;
    if(!this.data.routing.customRules)this.data.routing.customRules=[];
    this.data.routing.customRules.push({...this.newRule,id:Math.random().toString(36).substring(7)});
    this.newRule={type:'Domain',value:'',action:'Proxy',source:''};
    await this.saveData();this.showNotif(this.t('ruleAdded'));
  },

  async deleteRule(i){this.data.routing.customRules.splice(i,1);await this.saveData()},

  async testLatency(){
    this.testing=true;this.showNotif(this.t('testingAll').replace('...',''));
    const allNodes=[...this.data.nodes,...this.data.subscriptions.flatMap(s=>s.nodes)];
    for(const n of allNodes){
      try{const r=await fetch('/api/test-latency?id='+encodeURIComponent(n.id)+'&url='+encodeURIComponent(n.url));if(r.ok){const d=await r.json();n.latency=d.ms>0?d.ms:-1}}catch(e){n.latency=-1}
    }
    this.testing=false;this.showNotif(this.t('latencyTestDone'));
    try{await fetch('/api/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(this.data)})}catch(e){}
  },

  async resetEverything(){
    this.showResetConfirm=false;
    this.showNotif(this.t('resetWarning'));
    try{
      await fetch('/api/reset');
    }catch(e){}
  },

  getSettingHelp(key){
    const h={
      ipv6:this.t('help_ipv6'),
      fakeIP:this.t('help_fakeIP'),
      dnsLeaks:this.t('help_dnsLeaks'),

    const h={

  get parsedLogs(){
    return this.logs.map(line=>{
      let time='',dir='',domain='',source='',protocol='',raw=line;
      const tm=line.match(/\[(\d{2}:\d{2}:\d{2})\]/);
      if(tm)time=tm[1];

      const pMatch = line.match(/(inbound|outbound)\/([^\[:]+)/);
      if(pMatch) {
          dir=pMatch[1];
          protocol=pMatch[2];
      }

      const sm=line.match(/from ([\d\.]+:\d+)/);
      if(sm) source=sm[1];

      const dm=line.match(/to ([\w\.-]+:\d+)/);
      if(dm) domain=dm[1];

      if(!time) { time='-'; protocol='system'; domain=line.substring(0, 100); }

      return{time,dir,domain,source,protocol,raw};
    });
  },

  get filteredLogs() {
     return this.parsedLogs.filter(l => {
        if(this.logFilters.dir && l.dir !== this.logFilters.dir) return false;
        if(this.logFilters.protocol && l.protocol !== this.logFilters.protocol) return false;
        if(this.logFilters.domain && !l.domain.includes(this.logFilters.domain)) return false;
        return true;
     });
  },

  async fetchLogs(){
    try{const r=await fetch('/api/logs');if(r.ok){this.logs=await r.json()||[];this.$nextTick(()=>{const c=document.getElementById('logContainer');if(c)c.scrollTop=c.scrollHeight})}}catch(e){}
  },

  async clearLogFiles(){
    try{await fetch('/api/clear-logs',{method:'POST'});this.logs=[];this.showNotif(this.t('logFilesCleared'))}catch(e){this.showNotif(this.t('failedClear'),'error')}
  }
}));
});
